name: Deploy Laravel to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /www/wwwroot/thezonely.com
          git reset --hard
          git pull https://mdnayeemsarker:${{ secrets.VPS_GIT_PAT }}@github.com/mdnayeemsarker/thezonely.git main
          php artisan optimize:clear
          php artisan migrate
          php artisan optimize:clear
          echo "Deployment finished ✅"